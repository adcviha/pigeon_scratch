<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪶 Pigeon Scratch</title>
  <style>
    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: #e0e0dc;
      --text: #2c2c2a;
      --text-muted: #8a8a82;
      --accent: #d4a853;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    header {
      display: flex; justify-content: space-between; align-items: baseline;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px; margin-bottom: 24px;
    }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header .version { font-size: 0.8rem; color: var(--text-muted); }

    .import-bar {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      padding: 12px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; margin-bottom: 20px;
    }
    .import-bar label { font-size: 0.85rem; color: var(--text-muted); }
    .import-bar input[type="text"] {
      border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 8px; font-size: 0.9rem; width: 140px;
    }
    .import-bar input[type="file"] { font-size: 0.85rem; }
    .import-bar button {
      background: var(--accent); color: #fff; border: none;
      border-radius: 4px; padding: 6px 14px; font-size: 0.85rem;
      cursor: pointer; font-weight: 500;
    }
    .import-bar button:hover { opacity: 0.9; }

    .stats {
      font-size: 0.85rem; color: var(--text-muted);
      margin-bottom: 12px;
    }

    table {
      width: 100%; border-collapse: collapse; font-size: 0.9rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; overflow: hidden;
    }
    th, td { padding: 8px 12px; text-align: left; }
    th {
      font-weight: 600; font-size: 0.8rem; text-transform: uppercase;
      color: var(--text-muted); border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    th:hover { color: var(--text); }
    td { border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .amount-in  { color: #2e7d32; }
    .amount-out { color: #c62828; }
    .cat-tag {
      display: inline-block; padding: 1px 6px; border-radius: 3px;
      font-size: 0.75rem; font-weight: 500;
    }
    .cat-Bills          { background: #e3f2fd; color: #1565c0; }
    .cat-Discretionary  { background: #fff3e0; color: #e65100; }
    .cat-Income         { background: #e8f5e9; color: #2e7d32; }
    .cat-Transfer       { background: #f5f5f5; color: #757575; }
    .cat-null           { background: #fafafa; color: #aaa; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .empty-state p { margin-bottom: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>🪶 Pigeon Scratch</h1>
    <span class="version">v0.2.3</span>
  </header>

  <div class="import-bar">
    <label for="account-input">Account:</label>
    <input type="text" id="account-input" placeholder="e.g. td-checking" list="account-list">
    <datalist id="account-list"></datalist>
    <input type="file" id="file-input" accept=".csv">
    <button id="import-btn">Import</button>
    <span id="import-msg" style="font-size:0.8rem;color:var(--text-muted);"></span>
  </div>

  <div class="stats" id="stats-bar"></div>

  <div id="view-toolbar" style="display:none; margin-bottom:16px; gap:8px;">
    <button id="view-transactions-btn" data-view="transactions" style="border:1px solid var(--border);border-radius:4px;padding:5px 14px;font-size:0.85rem;cursor:pointer;">Transactions</button>
    <button id="view-categorize-btn" data-view="categorize" style="border:1px solid var(--border);border-radius:4px;padding:5px 14px;font-size:0.85rem;cursor:pointer;">Categorize</button>
    <button id="view-settings-btn" data-view="settings" style="border:1px solid var(--border);border-radius:4px;padding:5px 14px;font-size:0.85rem;cursor:pointer;">Settings</button>
  </div>

  <div id="main-content">
    <div class="empty-state">
      <p>No transactions yet.</p>
      <p>Pick an account name, choose a CSV file, and hit Import.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="src/import/parser.js?v=023"></script>
  <script src="src/import/normalize.js?v=023"></script>
  <script src="src/storage/db.js?v=023"></script>
  <script src="src/storage/dict.js?v=023"></script>
  <script src="src/storage/state.js?v=023"></script>
  <script src="src/ui/render.js?v=023"></script>
  <script src="src/ui/importFlow.js?v=023"></script>
  <script src="src/ai/prompts.js?v=023"></script>
  <script src="src/ai/suggest.js?v=023"></script>
  <script src="src/ui/categorize.js?v=023"></script>
  <script src="src/ui/settings.js?v=023"></script>
  <script src="src/app.js?v=023"></script>
</body>
</html>
